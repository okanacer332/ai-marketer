services:
  mongodb:
    image: mongo:7.0
    container_name: acrtech-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - acrtech_mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "quit(db.adminCommand({ ping: 1 }).ok ? 0 : 2)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: acrtech-backend
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      FRONTEND_ORIGIN: http://localhost:5173
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB_NAME: acrtech_ai_marketer
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - .:/app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, sys, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/api/health')); sys.exit(0 if data.get('status') == 'ok' else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  acrtech_mongodb_data:
    name: acrtech_mongodb_data
